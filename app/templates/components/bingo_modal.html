<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">

        <h2 class="text-3xl font-bold text-white mb-2 text-glow">BINGO!</h2>
        <p class="text-gray-500 mb-6">You completed a line!</p>

        <button
