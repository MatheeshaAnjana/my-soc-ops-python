<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6">
    <div class="text-center max-w-sm space-y-6">
        <div class="glass-panel rounded-3xl p-8 border border-indigo-500/15 shadow-neon">
            <h1 class="text-5xl font-bold text-white mb-2 tracking-[0.24em] text-glow">Soc Ops</h1>
            <p class="text-sm text-gray-500 mb-8 uppercase tracking-[0.2em]">Neon social bingo</p>

            <div class="bg-gray-100 rounded-2xl p-6 shadow-sm border border-gray-300 mb-8">
                <h2 class="font-semibold text-white mb-3">How to play</h2>
                <ul class="text-left text-gray-500 text-sm space-y-2">
                    <li>• Find people who match the questions</li>
                    <li>• Tap a square when you find a match</li>
                    <li>• Get 5 in a row to win!</li>
                </ul>
            </div>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-primary font-semibold py-4 px-8 rounded-full text-lg transition-all">
            Start Game
        </button>
    </div>
</div>
</div>
